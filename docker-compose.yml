services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  batch_pipeline:
    build: .
    container_name: hespress-batch
    depends_on:
      - kafka
    volumes:
      - .:/app
    command: sh -c "sleep 10 && python pipeline.py"

  consumer_stream:
    build: .
    container_name: hespress-consumer
    depends_on:
      - kafka
    volumes:
      - .:/app
    command: sh -c "sleep 30 && python consumer_stream.py"

  producer_stream:
    build: .
    container_name: hespress-producer
    depends_on:
      - kafka
      - consumer_stream
    volumes:
      - .:/app
    command: sh -c "sleep 40 && python producer_stream.py"